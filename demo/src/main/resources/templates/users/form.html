<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thêm/Sửa Người Dùng</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f4f7f6; padding: 40px; }
        .form-container { background: white; max-width: 500px; margin: 0 auto; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #4a5568; font-weight: 500; }
        input[type="text"], input[type="password"], select { width: 100%; padding: 10px; border: 1px solid #cbd5e0; border-radius: 5px; box-sizing: border-box; }
        .btn-submit { width: 100%; padding: 12px; background-color: #0d8abc; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .btn-cancel { display: block; text-align: center; margin-top: 15px; color: #718096; text-decoration: none; }
    </style>
</head>
<body>
    <div class="form-container">
        <h2 th:text="${user.id != null ? 'Cập Nhật Người Dùng' : 'Thêm Người Dùng Mới'}"></h2>
        
        <form th:action="${user.id != null ? '/users/update/' + user.id : '/users/save'}" th:object="${user}" method="post">
            
            <div class="form-group">
                <label>Tên đăng nhập</label>
                <input type="text" th:field="*{username}" required th:readonly="${user.id != null}">
            </div>
            
            <div class="form-group">
                <label>Mật khẩu</label>
                <!-- Nếu đang sửa, có thể bỏ trống để giữ nguyên MK cũ. Nhưng ở ví dụ này ta bắt nhập lại -->
                <input type="password" th:field="*{password}" required>
            </div>
            
            <div class="form-group">
                <label>Họ và tên</label>
                <input type="text" th:field="*{fullName}" required>
            </div>
            
            <div class="form-group">
                <label>Vai trò (Role)</label>
                <select th:field="*{role}">
                    <option th:each="r : ${roles}" th:value="${r}" th:text="${r}"></option>
                </select>
            </div>
            
            <button type="submit" class="btn-submit">Lưu Thay Đổi</button>
            <a href="/users" class="btn-cancel">Hủy bỏ</a>
        </form>
    </div>
</body>
</html>
