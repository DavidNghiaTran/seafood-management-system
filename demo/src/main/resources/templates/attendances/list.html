<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/base}">
<head>
    <title>Chấm Công Nhân Viên - Quản Lý Nhà Hàng Hải Sản</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="dashboard-header" style="display: flex; justify-content: space-between; align-items: center;">
            <div>
                <h1 class="page-title">Quản Lý Chấm Công</h1>
                <p class="subtitle">Ghi nhận giờ giấc làm việc, ca làm và ngày công.</p>
            </div>
            <a th:href="@{/attendances/create}" class="btn btn-primary"><i class="fa-solid fa-plus"></i> Thêm Bản Ghi Chấm Công</a>
        </div>

        <div class="panel">
            <div class="table-responsive">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Ngày</th>
                            <th>Ca Làm</th>
                            <th>Nhân Viên</th>
                            <th>Vị Trí</th>
                            <th>Giờ Check-in</th>
                            <th>Trạng Thái</th>
                            <th>Ghi Chú</th>
                            <th style="width: 100px; text-align: center;">Hành Động</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="attendance : ${attendances}">
                            <td th:text="${#temporals.format(attendance.workDate, 'dd/MM/yyyy')}" style="font-weight: 600;">01/01/2026</td>
                            <td th:text="${attendance.shift}">Sáng</td>
                            <td th:text="${attendance.employee.fullName}">Nguyễn Văn B</td>
                            <td th:text="${attendance.employee.position}">Phục vụ</td>
                            <td th:text="${attendance.checkInTime != null ? #temporals.format(attendance.checkInTime, 'HH:mm:ss') : '-'}">08:00</td>
                            <td>
                                 <span th:if="${attendance.status == 'CÓ MẶT'}" class="status-badge status-active">Có mặt</span>
                                <span th:if="${attendance.status == 'VẮNG MẶT'}" class="status-badge status-inactive">Vắng mặt</span>
                                <span th:if="${attendance.status == 'TRỄ'}" class="status-badge status-pending">Đi trễ</span>
                            </td>
                            <td th:text="${attendance.notes != null ? attendance.notes : ''}">Đi trễ 10p</td>
                            <td style="text-align: center;">
                                <a th:href="@{/attendances/edit/{id}(id=${attendance.id})}" class="action-btn" title="Sửa"><i class="fa-solid fa-pen-to-square"></i></a>
                                <a th:href="@{/attendances/delete/{id}(id=${attendance.id})}" class="action-btn text-danger" title="Xóa" onclick="return confirm('Bạn có chắc chắn muốn xóa bản ghi chấm công này?');" style="margin-left: 10px;"><i class="fa-solid fa-trash"></i></a>
                            </td>
                        </tr>
                        <tr th:if="${attendances.empty}">
                            <td colspan="8" style="text-align: center; padding: 2rem; color: var(--gray-600);">Chưa có bản ghi chấm công nào.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
