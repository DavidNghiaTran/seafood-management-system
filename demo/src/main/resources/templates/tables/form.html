<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/base}">
<head>
    <title th:text="${table.id == null ? 'Thêm Bàn Mới' : 'Cập Nhật Bàn'}">Form Bàn</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="dashboard-header">
            <h1 class="page-title" th:text="${table.id == null ? 'Thêm Bàn Mới' : 'Cập Nhật Bàn'}">Quản Lý Bàn</h1>
            <a th:href="@{/tables}" class="btn" style="background-color: var(--gray-200); color: var(--dark);"><i class="fa-solid fa-arrow-left"></i> Quay lại Danh sách</a>
        </div>

        <div class="panel" style="max-width: 600px;">
            <form th:action="@{/tables/save}" th:object="${table}" method="post">
                <input type="hidden" th:field="*{id}" />
                
                <div class="form-group" style="margin-bottom: 1.5rem;">
                    <label for="tableNumber" style="display: block; font-weight: 600; margin-bottom: 0.5rem; color: var(--dark);">Số Bàn (Tên Bàn) <span class="text-danger">*</span></label>
                    <input type="text" id="tableNumber" th:field="*{tableNumber}" class="form-control" placeholder="VD: Bàn 01" required style="width: 100%; padding: 0.8rem; border: 1px solid var(--border-color); border-radius: var(--radius-md); font-family: inherit;">
                </div>
                
                <div class="form-group" style="margin-bottom: 1.5rem;">
                    <label for="capacity" style="display: block; font-weight: 600; margin-bottom: 0.5rem; color: var(--dark);">Sức Chứa (Người) <span class="text-danger">*</span></label>
                    <input type="number" id="capacity" th:field="*{capacity}" class="form-control" required min="1" max="100" style="width: 100%; padding: 0.8rem; border: 1px solid var(--border-color); border-radius: var(--radius-md); font-family: inherit;">
                </div>

                <div class="form-group" style="margin-bottom: 1.5rem;">
                    <label style="display: block; font-weight: 600; margin-bottom: 0.5rem; color: var(--dark);">Trạng Thái</label>
                    <div style="display: flex; gap: 1rem; align-items: center;">
                        <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
                            <input type="radio" th:field="*{status}" th:value="true"> Trống (Available)
                        </label>
                        <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
                            <input type="radio" th:field="*{status}" th:value="false"> Đang Phục Vụ (Occupied)
                        </label>
                    </div>
                </div>
                
                <button type="submit" class="btn btn-primary" style="padding: 0.8rem 1.5rem; font-size: 1rem;">
                    <i class="fa-solid fa-save"></i> <span th:text="${table.id == null ? 'Lưu Bàn' : 'Cập Nhật'}">Lưu</span>
                </button>
            </form>
        </div>
    </div>
</body>
</html>
