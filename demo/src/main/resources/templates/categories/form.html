<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/base}">
<head>
    <title th:text="${category.id == null ? 'Thêm Danh Mục Mới' : 'Cập Nhật Danh Mục'}">Form Danh Mục</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="dashboard-header">
            <h1 class="page-title" th:text="${category.id == null ? 'Thêm Danh Mục Mới' : 'Cập Nhật Danh Mục'}">Quản Lý Danh Mục</h1>
            <a th:href="@{/categories}" class="btn" style="background-color: var(--gray-200); color: var(--dark);"><i class="fa-solid fa-arrow-left"></i> Quay lại Danh sách</a>
        </div>

        <div class="panel" style="max-width: 600px;">
            <form th:action="@{/categories/save}" th:object="${category}" method="post">
                <input type="hidden" th:field="*{id}" />
                
                <div class="form-group" style="margin-bottom: 1.5rem;">
                    <label for="name" style="display: block; font-weight: 600; margin-bottom: 0.5rem; color: var(--dark);">Tên Danh Mục <span class="text-danger">*</span></label>
                    <input type="text" id="name" th:field="*{name}" class="form-control" required style="width: 100%; padding: 0.8rem; border: 1px solid var(--border-color); border-radius: var(--radius-md); font-family: inherit;">
                </div>
                
                <div class="form-group" style="margin-bottom: 1.5rem;">
                    <label for="description" style="display: block; font-weight: 600; margin-bottom: 0.5rem; color: var(--dark);">Mô Tả</label>
                    <textarea id="description" th:field="*{description}" class="form-control" rows="4" style="width: 100%; padding: 0.8rem; border: 1px solid var(--border-color); border-radius: var(--radius-md); font-family: inherit; resize: vertical;"></textarea>
                </div>
                
                <button type="submit" class="btn btn-primary" style="padding: 0.8rem 1.5rem; font-size: 1rem;">
                    <i class="fa-solid fa-save"></i> <span th:text="${category.id == null ? 'Lưu Danh Mục' : 'Cập Nhật'}">Lưu</span>
                </button>
            </form>
        </div>
    </div>
</body>
</html>
