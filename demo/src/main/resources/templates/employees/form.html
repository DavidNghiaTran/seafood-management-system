<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/base}">
<head>
    <title th:text="${employee.id == null ? 'Thêm Nhân Viên Mới' : 'Cập Nhật Nhân Viên'}">Form Nhân Viên</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="dashboard-header">
            <h1 class="page-title" th:text="${employee.id == null ? 'Thêm Nhân Viên Mới' : 'Cập Nhật Nhân Viên'}">Quản Lý Nhân Viên</h1>
            <a th:href="@{/employees}" class="btn" style="background-color: var(--gray-200); color: var(--dark);"><i class="fa-solid fa-arrow-left"></i> Quay lại Danh sách</a>
        </div>

        <div class="panel" style="max-width: 600px;">
            <form th:action="${employee.id == null} ? @{/employees/save} : @{/employees/update/{id}(id=${employee.id})}" th:object="${employee}" method="post">
                <input type="hidden" th:field="*{id}" />
                <input type="hidden" th:field="*{role}" />
                
                <div class="form-group" style="margin-bottom: 1.5rem;">
                    <label for="fullName" style="display: block; font-weight: 600; margin-bottom: 0.5rem; color: var(--dark);">Họ Tên <span class="text-danger">*</span></label>
                    <input type="text" id="fullName" th:field="*{fullName}" class="form-control" required style="width: 100%; padding: 0.8rem; border: 1px solid var(--border-color); border-radius: var(--radius-md); font-family: inherit;">
                </div>
                
                <div class="form-group" style="margin-bottom: 1.5rem;">
                    <label for="username" style="display: block; font-weight: 600; margin-bottom: 0.5rem; color: var(--dark);">Tên Đăng Nhập <span class="text-danger">*</span></label>
                    <input type="text" id="username" th:field="*{username}" class="form-control" required style="width: 100%; padding: 0.8rem; border: 1px solid var(--border-color); border-radius: var(--radius-md); font-family: inherit;" th:readonly="${employee.id != null}">
                </div>

                <div class="form-group" style="margin-bottom: 1.5rem;">
                    <label for="phone" style="display: block; font-weight: 600; margin-bottom: 0.5rem; color: var(--dark);">Số Điện Thoại</label>
                    <input type="text" id="phone" th:field="*{phone}" class="form-control" style="width: 100%; padding: 0.8rem; border: 1px solid var(--border-color); border-radius: var(--radius-md); font-family: inherit;">
                </div>

                <div class="form-group" style="margin-bottom: 1.5rem;">
                    <label for="address" style="display: block; font-weight: 600; margin-bottom: 0.5rem; color: var(--dark);">Địa Chỉ</label>
                    <textarea id="address" th:field="*{address}" class="form-control" rows="2" style="width: 100%; padding: 0.8rem; border: 1px solid var(--border-color); border-radius: var(--radius-md); font-family: inherit; resize: vertical;"></textarea>
                </div>

                <div class="form-group" style="margin-bottom: 1.5rem;">
                    <label for="position" style="display: block; font-weight: 600; margin-bottom: 0.5rem; color: var(--dark);">Vị Trí Làm Việc</label>
                    <input type="text" id="position" th:field="*{position}" class="form-control" placeholder="VD: Phục vụ, Đầu bếp..." style="width: 100%; padding: 0.8rem; border: 1px solid var(--border-color); border-radius: var(--radius-md); font-family: inherit;">
                </div>

                <div class="form-group" style="margin-bottom: 1.5rem;" th:if="${employee.id == null}">
                    <label for="password" style="display: block; font-weight: 600; margin-bottom: 0.5rem; color: var(--dark);">Mật Khẩu <span class="text-danger">*</span></label>
                    <input type="password" id="password" th:field="*{password}" class="form-control" required style="width: 100%; padding: 0.8rem; border: 1px solid var(--border-color); border-radius: var(--radius-md); font-family: inherit;">
                </div>

                <div class="form-group" style="margin-bottom: 1.5rem;" th:if="${employee.id != null}">
                    <label for="passwordEdit" style="display: block; font-weight: 600; margin-bottom: 0.5rem; color: var(--dark);">Mật Khẩu Mới (để trống nếu không đổi)</label>
                    <input type="password" id="passwordEdit" th:field="*{password}" class="form-control" style="width: 100%; padding: 0.8rem; border: 1px solid var(--border-color); border-radius: var(--radius-md); font-family: inherit;">
                </div>
                
                <button type="submit" class="btn btn-primary" style="padding: 0.8rem 1.5rem; font-size: 1rem;">
                    <i class="fa-solid fa-save"></i> <span th:text="${employee.id == null ? 'Lưu Nhân Viên' : 'Cập Nhật'}">Lưu</span>
                </button>
            </form>
        </div>
    </div>
</body>
</html>
