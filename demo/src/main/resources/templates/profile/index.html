<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/base}">
<head>
    <title>Thông Tin Cá Nhân - Seafood Admin</title>
</head>
<body>
    <div layout:fragment="content">
        <!-- Thông báo -->
        <div th:if="${successMessage}" class="alert alert-success" style="background: #d4edda; color: #155724; padding: 12px 20px; border-radius: 8px; margin-bottom: 16px; border: 1px solid #c3e6cb;">
            <i class="fa-solid fa-circle-check"></i> <span th:text="${successMessage}"></span>
        </div>
        
        <div class="dashboard-header">
            <h1 class="page-title">Thông Tin Cá Nhân</h1>
            <p class="subtitle">Quản lý và cập nhật thông tin tài khoản của bạn</p>
        </div>

        <div class="panel" style="max-width: 600px;">
            <form th:action="@{/profile/update}" th:object="${userProfile}" method="post">
                
                <div class="form-group" style="margin-bottom: 1.5rem;">
                    <label style="display: block; font-weight: 600; margin-bottom: 0.5rem; color: var(--dark);">Vai Trò / Mảng Công Việc</label>
                    <input type="text" class="form-control" th:value="${userProfile.role}" disabled style="width: 100%; padding: 0.8rem; border: 1px solid var(--border-color); border-radius: var(--radius-md); font-family: inherit; background-color: #f1f5f9; cursor: not-allowed;">
                </div>

                <div class="form-group" style="margin-bottom: 1.5rem;">
                    <label style="display: block; font-weight: 600; margin-bottom: 0.5rem; color: var(--dark);">Tên Đăng Nhập</label>
                    <input type="text" class="form-control" th:value="${userProfile.username}" disabled style="width: 100%; padding: 0.8rem; border: 1px solid var(--border-color); border-radius: var(--radius-md); font-family: inherit; background-color: #f1f5f9; cursor: not-allowed;">
                </div>

                <div class="form-group" style="margin-bottom: 1.5rem;">
                    <label for="fullName" style="display: block; font-weight: 600; margin-bottom: 0.5rem; color: var(--dark);">Họ Tên <span class="text-danger">*</span></label>
                    <input type="text" id="fullName" th:field="*{fullName}" class="form-control" required style="width: 100%; padding: 0.8rem; border: 1px solid var(--border-color); border-radius: var(--radius-md); font-family: inherit;">
                </div>

                <div class="form-group" style="margin-bottom: 1.5rem;">
                    <label for="phone" style="display: block; font-weight: 600; margin-bottom: 0.5rem; color: var(--dark);">Số Điện Thoại</label>
                    <input type="text" id="phone" th:field="*{phone}" class="form-control" pattern="[0-9]*" oninput="this.value = this.value.replace(/[^0-9]/g, '');" style="width: 100%; padding: 0.8rem; border: 1px solid var(--border-color); border-radius: var(--radius-md); font-family: inherit;">
                </div>

                <div class="form-group" style="margin-bottom: 1.5rem;">
                    <label for="address" style="display: block; font-weight: 600; margin-bottom: 0.5rem; color: var(--dark);">Địa Chỉ</label>
                    <textarea id="address" th:field="*{address}" class="form-control" rows="2" style="width: 100%; padding: 0.8rem; border: 1px solid var(--border-color); border-radius: var(--radius-md); font-family: inherit; resize: vertical;"></textarea>
                </div>

                <div class="form-group" style="margin-bottom: 1.5rem;">
                    <label for="password" style="display: block; font-weight: 600; margin-bottom: 0.5rem; color: var(--dark);">Đổi Mật Khẩu Mới (Bỏ trống nếu không đổi)</label>
                    <input type="password" id="password" name="password" class="form-control" placeholder="Nhập mật khẩu mới tại đây" style="width: 100%; padding: 0.8rem; border: 1px solid var(--border-color); border-radius: var(--radius-md); font-family: inherit;">
                </div>
                
                <button type="submit" class="btn btn-primary" style="padding: 0.8rem 1.5rem; font-size: 1rem;">
                    <i class="fa-solid fa-save"></i> Cập Nhật 
                </button>
            </form>
        </div>
    </div>
</body>
</html>
